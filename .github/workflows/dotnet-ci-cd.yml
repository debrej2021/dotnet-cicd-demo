name: .NET CI/CD Pipeline

# ─────────────────────────────────────────────
# TRIGGERS
# Runs on every push or PR to main branch
# ─────────────────────────────────────────────
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# ─────────────────────────────────────────────
# ENVIRONMENT VARIABLES (shared across jobs)
# ─────────────────────────────────────────────
env:
  DOTNET_VERSION: '8.0.x'
  IMAGE_NAME: dotnet-app
  REGISTRY: docker.io

jobs:

  # ═══════════════════════════════════════════
  # JOB 1: BUILD + TEST
  # ═══════════════════════════════════════════
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:

      # STEP 1: Pull your repo into the runner
      - name: Checkout Code
        uses: actions/checkout@v4

      # STEP 2: Install .NET SDK
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # STEP 3: Restore NuGet packages
      - name: Restore Dependencies
        run: dotnet restore

      # STEP 4: Compile in Release mode
      - name: Build
        run: dotnet build --no-restore --configuration Release

      # STEP 5: Run all unit/integration tests
      # --collect for code coverage (optional but good practice)
      - name: Run Tests
        run: dotnet test --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage"

      # STEP 6: Publish compiled app to /publish folder
      - name: Publish App
        run: dotnet publish -c Release -o publish

      # STEP 7: Upload published artifact (reused in docker job)
      - name: Upload Published Artifact
        uses: actions/upload-artifact@v4
        with:
          name: published-app
          path: publish/

  # ═══════════════════════════════════════════
  # JOB 2: DOCKER BUILD + PUSH
  # Only runs after build-and-test succeeds
  # ═══════════════════════════════════════════
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test  # ← Depends on Job 1

    steps:

      # STEP 1: Checkout code (needed for Dockerfile)
      - name: Checkout Code
        uses: actions/checkout@v4

      # STEP 2: Download published artifact from Job 1
      - name: Download Published Artifact
        uses: actions/download-artifact@v4
        with:
          name: published-app
          path: publish/

      # STEP 3: Login to Docker Hub
      # Uses secrets set in GitHub → Settings → Secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # STEP 4: Extract metadata (tags + labels) for Docker
      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # STEP 5: Set up Docker Buildx (for multi-platform builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # STEP 6: Build and push Docker image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha      # GitHub Actions cache
          cache-to: type=gha,mode=max

  # ═══════════════════════════════════════════
  # JOB 3: DEPLOY TO STAGING
  # Only runs after Docker image is pushed
  # Only on push to main (not PRs)
  # ═══════════════════════════════════════════
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging   # ← GitHub Environment (for protection rules)

    steps:

      # Option A: Deploy to AWS ECS
      # Uncomment and configure if using AWS ECS
      # - name: Configure AWS Credentials
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     aws-region: ap-south-1
      #
      # - name: Deploy to ECS
      #   run: |
      #     aws ecs update-service \
      #       --cluster your-cluster \
      #       --service your-service-staging \
      #       --force-new-deployment

      # Option B: Deploy to Azure App Service
      # Uncomment and configure if using Azure
      # - name: Azure Login
      #   uses: azure/login@v1
      #   with:
      #     creds: ${{ secrets.AZURE_CREDENTIALS }}
      #
      # - name: Deploy to Azure Web App
      #   uses: azure/webapps-deploy@v2
      #   with:
      #     app-name: your-staging-app
      #     images: docker.io/${{ secrets.DOCKER_USERNAME }}/dotnet-app:latest

      # Option C: Simple SSH deploy (generic)
      - name: Deploy via SSH (Generic)
        run: |
          echo "Deploy to staging triggered"
          echo "Image: docker.io/${{ secrets.DOCKER_USERNAME }}/dotnet-app:latest"
          # Replace with your actual deploy command

  # ═══════════════════════════════════════════
  # JOB 4: DEPLOY TO PRODUCTION
  # Requires manual approval in GitHub
  # Only after staging deploy passes
  # ═══════════════════════════════════════════
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production   # ← Set required reviewers in GitHub Environments

    steps:

      - name: Production Deploy
        run: |
          echo "Production deployment triggered after manual approval"
          echo "Image: docker.io/${{ secrets.DOCKER_USERNAME }}/dotnet-app:latest"
          # Replace with your actual production deploy command (ECS, AKS, Azure, etc.)

      # STEP: Health Check after deploy
      - name: Health Check
        run: |
          echo "Running post-deployment health check..."
          # curl -f https://your-production-url/health || exit 1
          echo "Health check passed ✅"

      # STEP: Notify team on success (optional)
      # - name: Notify Slack
      #   uses: slackapi/slack-github-action@v1
      #   with:
      #     payload: '{"text": "✅ Production deploy succeeded!"}'
      #   env:
      #     SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
